  <div class="app-shell">

    <!-- SIDEBAR GLOBAL -->
    <aside class="sidebar" *ngIf="isAuthenticated()">

      <div class="brand">⚡ NEXUS SYSTEM</div>

      <nav>
        <a routerLink="/dashboard" routerLinkActive="active">🏠 Dashboard</a>
        <a routerLink="/dashboard" routerLinkActive="active">📊 Analytics</a>
        <a routerLink="/dashboard" routerLinkActive="active">👥 Users</a>
        <a routerLink="/dashboard" routerLinkActive="active">⚙️ Settings</a>
      </nav>

      <button (click)="logout()">🚪 Logout</button>

    </aside>

    <!-- MAIN -->
    <div class="main">

      <!-- TOPBAR GLOBAL -->
      <header class="topbar" *ngIf="isAuthenticated()">
        <h3>{{ pageTitle }}</h3>
        <div>👤 {{ getUser() }}</div>
      </header>

      <!-- RENDER DAS PÁGINAS -->
      <main class="page">
        <router-outlet></router-outlet>
      </main>

    </div>

  </div>

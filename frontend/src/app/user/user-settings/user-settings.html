<!-- NAVBAR -->
<nav class="navbar">

  <div class="brand">
    <span class="dot"></span>
    TechFlow
  </div>

  <div class="links">
    <a routerLink="/user" routerLinkActive="active">Dashboard</a>
    <a routerLink="/user/products" routerLinkActive="active">Products</a>
    <a routerLink="/user/profile" routerLinkActive="active">Profile</a>
    <a routerLink="/user/settings" routerLinkActive="active">Settings</a>
  </div>

  <div class="right">
    <button (click)="goBack()">⬅ Back</button>
  </div>

</nav>

<!-- PAGE -->
<div class="container">

  <h1 class="title">Settings</h1>

  <!-- PROFILE CARD -->
  <div class="card">

    <h2>{{ user.name }}</h2>
    <p>{{ user.email }}</p>

    <span class="role">{{ user.role }}</span>

  </div>

  <!-- SETTINGS -->
  <div class="settings">

    <!-- DARK MODE -->
    <div class="setting-item">

      <div>
        <h3>Theme</h3>
        <p>Dark / Light mode</p>
      </div>

      <button (click)="toggleTheme()">
        {{ darkMode ? 'Dark Mode' : 'Light Mode' }}
      </button>

    </div>

    <!-- LOGOUT -->
    <div class="setting-item">

      <div>
        <h3>Session</h3>
        <p>Logout from system</p>
      </div>

      <button (click)="logout()">Logout</button>

    </div>

    <!-- DELETE ACCOUNT -->
    <div class="setting-item danger">

      <div>
        <h3>Danger Zone</h3>
        <p>Delete your account permanently</p>
      </div>

      <button (click)="deleteAccount()">Delete</button>

    </div>

  </div>

</div>

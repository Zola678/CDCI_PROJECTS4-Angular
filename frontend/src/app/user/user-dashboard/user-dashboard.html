<!-- NAVBAR -->
<nav class="navbar">

  <div class="brand">
    <span class="dot"></span>
    TechFlow
  </div>

  <div class="links">
    <a routerLink="/user" routerLinkActive="active">Dashboard</a>
    <a routerLink="/user/products" routerLinkActive="active">Products</a>
    <a routerLink="/user/profile" routerLinkActive="active">Profile</a>
    <a routerLink="/user/settings" routerLinkActive="active">Settings</a>
  </div>

  <div class="right">
    <span class="email">{{ email }}</span>
    <button (click)="logout()">Logout</button>
  </div>

</nav>

<!-- DASHBOARD -->
<div class="container">

  <h1 class="title">Dashboard</h1>

  <!-- STATS -->
  <div class="cards">

    <div class="card">
      <h3>Services</h3>
      <p>{{ servicesCount }}</p>
    </div>

    <div class="card">
      <h3>Products</h3>
      <p>{{ productsCount }}</p>
    </div>

  </div>

  <!-- PURCHASES -->
  <div class="activity">

    <h3>Recent Purchases</h3>

    <!-- EMPTY -->
    <div *ngIf="purchases.length === 0" class="empty">
      Nenhuma compra encontrada 🚫
    </div>

    <!-- LIST -->
    <div *ngFor="let item of purchases" class="item">

      <div>
        <span>{{ item.name }}</span>
        <small>{{ item.date }}</small>
      </div>

      <button class="delete" (click)="deletePurchase(item.id)">
        🗑
      </button>

    </div>

  </div>

</div>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="brand">
    <span class="dot"></span>
    TechFlow Admin
  </div>

  <div class="links">
    <a routerLink="/admin">Dashboard</a>
    <a routerLink="/admin/users">Users</a>
    <a routerLink="/admin/products" class="active">Products</a>
  </div>

  <div class="right">
    <button routerLink="/admin">⬅ Back</button>
  </div>

</nav>

<!-- CONTAINER -->
<div class="admin">

  <h1 class="title">Products Management</h1>

  <!-- LOADING -->
  <div *ngIf="loading" class="loading">
    Carregando produtos...
  </div>

  <!-- ERROR -->
  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <!-- EMPTY -->
  <div *ngIf="!loading && products.length === 0" class="empty">
    Nenhum produto encontrado 🚫
  </div>

  <!-- GRID -->
  <div class="grid" *ngIf="!loading && products.length > 0">

    <div class="card" *ngFor="let product of products">

      <h3>{{ product.name }}</h3>

      <p class="desc">
        {{ product.description || 'Sem descrição' }}
      </p>

      <div class="info">

        <span class="price">
          {{ product.price ? product.price + ' Kz' : 'Preço não definido' }}
        </span>

        <small *ngIf="product.user">
          👤 {{ product.user.name }}
        </small>

      </div>

      <div class="actions">
        <button class="danger" (click)="deleteProduct(product.id)">
          🗑 Delete
        </button>
      </div>

    </div>

  </div>

</div>

<div class="login-wrapper">

  <div class="login-card">

    <div class="logo">Open Box Corporation</div>

    <h1>Bem-vindo de volta</h1>
    <p>Faça login para continuar</p>

    <form (ngSubmit)="login()" class="form">

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
      >

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        required
      >

      <!-- 🔴 ERROR MESSAGE -->
      <p class="error" *ngIf="error">{{ error }}</p>

      <!-- 🔵 LOADING STATE -->
      <button type="submit" [disabled]="loading">
        {{ loading ? 'A entrar...' : 'Entrar' }}
      </button>

    </form>

    <div class="footer">
      Não tens conta? <a routerLink="/register">Regista-te</a>
    </div>

  </div>

</div>

<div class="register-wrapper">

  <div class="card">

    <div class="logo">⚡ NEXUS SYSTEM</div>

    <h1>Criar Conta</h1>
    <p>Regista-te para aceder ao sistema</p>

    <form (ngSubmit)="register()" class="form">

      <input type="text" placeholder="Nome" [(ngModel)]="name" name="name" required>

      <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required>

      <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required>

      <input type="password" placeholder="Confirmar Password" [(ngModel)]="password_confirmation" name="password_confirmation" required>

      <p class="error" *ngIf="error">{{ error }}</p>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'A criar...' : 'Criar Conta' }}
      </button>

    </form>

    <div class="footer">
      Já tens conta?
      <a routerLink="/login">Login</a>
    </div>

  </div>

</div>
